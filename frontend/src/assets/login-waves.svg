<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2=".85" y2="1">
      <stop offset="0" stop-color="#fffaf3"/>
      <stop offset=".55" stop-color="#fff2e2"/>
      <stop offset="1" stop-color="#ffe7cf"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="1" y2=".4">
      <stop offset="0" stop-color="#ffe7cb"/>
      <stop offset="1" stop-color="#ffedd6"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="1" y2=".4">
      <stop offset="0" stop-color="#fff5e8"/>
      <stop offset="1" stop-color="#fffaf2"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="1" y2=".5">
      <stop offset="0" stop-color="#ffdcb4"/>
      <stop offset="1" stop-color="#ffe6c6"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="1" y2=".5">
      <stop offset="0" stop-color="#fff7ec"/>
      <stop offset="1" stop-color="#fffdf8"/>
    </linearGradient>
    <radialGradient id="sun" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff8ea" stop-opacity=".85"/>
      <stop offset="1" stop-color="#fff8ea" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#base)"/>

  <!-- warm light bloom upper-right -->
  <ellipse cx="1220" cy="120" rx="620" ry="420" fill="url(#sun)"/>

  <!-- flowing layered wave bands, soft + low-contrast -->
  <path d="M-60 250C240 150 460 340 780 260 1080 186 1340 300 1660 220V1050H-60Z" fill="url(#b1)" opacity=".9"/>
  <path d="M-60 470C260 358 480 560 800 470 1100 386 1360 520 1660 430V1050H-60Z" fill="url(#b2)" opacity=".85"/>
  <path d="M-60 680C240 556 470 760 790 670 1090 586 1360 720 1660 620V1050H-60Z" fill="url(#b3)" opacity=".8"/>
  <path d="M-60 862C260 756 480 942 800 858 1100 782 1360 900 1660 818V1050H-60Z" fill="url(#b4)" opacity=".9"/>

  <!-- crisp flowing highlight strokes -->
  <path d="M-60 470C260 358 480 560 800 470 1100 386 1360 520 1660 430" fill="none" stroke="#ffffff" stroke-width="2.5" opacity=".4"/>
  <path d="M-60 680C240 556 470 760 790 670 1090 586 1360 720 1660 620" fill="none" stroke="#ffffff" stroke-width="2" opacity=".28"/>
</svg>
